<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYNYLIHIS BOOTCAMP LIVE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --glass-bg: rgba(8, 12, 24, 0.72);
      --glass-border: rgba(120, 180, 255, 0.22);
      --text-main: #f7fbff;
      --text-muted: rgba(210, 226, 255, 0.78);
      --accent: #72c4ff;
      --accent-strong: #3ea4ff;
      --danger: #ff6b6b;
      --ok: #35d07f;
      --warn: #ffb347;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #000;
    }

    /* ── YouTube background ── */
    #yt-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    #yt-bg iframe {
      position: absolute;
      /* Over-size to cover any aspect ratio */
      width: 200vw;
      height: 200vh;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: none;
    }

    /* Dark + colour overlay */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        160deg,
        rgba(0, 0, 0, 0.72) 0%,
        rgba(10, 10, 30, 0.68) 50%,
        rgba(0, 0, 0, 0.78) 100%
      );
      backdrop-filter: brightness(0.9) saturate(1.4);
    }

    /* ── Main content ── */
    #content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 1rem;
      min-height: 100vh;
      padding: clamp(1rem, 2.6vw, 2rem);
      overflow-y: auto;
    }

    /* Title */
    .main-title {
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      font-size: clamp(2.2rem, 8vw, 5.2rem);
      letter-spacing: 0.1em;
      color: #fff;
      text-shadow:
        0 0 20px rgba(114, 196, 255, 0.85),
        0 0 50px rgba(40, 122, 255, 0.58),
        0 4px 8px rgba(0, 0, 0, 0.9);
      text-transform: uppercase;
      user-select: none;
      text-align: center;
    }

    /* Sub-label */
    .sub-label {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-size: clamp(0.85rem, 2.2vw, 1.2rem);
      font-weight: 600;
      letter-spacing: 0.24em;
      color: rgba(184, 224, 255, 0.9);
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(70, 157, 255, 0.55);
      margin-top: -0.4rem;
      user-select: none;
      text-align: center;
    }

    .panel {
      width: min(1100px, 100%);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow:
        0 16px 60px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(7px) saturate(1.2);
      padding: clamp(0.9rem, 2.2vw, 1.4rem);
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.7rem;
    }

    .meta {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      font-size: clamp(0.86rem, 1.7vw, 1rem);
    }

    .status-dot {
      display: inline-block;
      width: 0.6rem;
      height: 0.6rem;
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
      background: var(--warn);
      box-shadow: 0 0 12px rgba(255, 179, 71, 0.8);
    }

    .status-dot.ok {
      background: var(--ok);
      box-shadow: 0 0 12px rgba(53, 208, 127, 0.8);
    }

    .controls,
    .key-row,
    .pager {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }

    .controls {
      justify-content: space-between;
      margin-bottom: 0.8rem;
    }

    .key-row {
      margin-bottom: 0.8rem;
    }

    input[type="text"],
    input[type="password"] {
      width: min(420px, 100%);
      border: 1px solid rgba(137, 194, 255, 0.35);
      background: rgba(12, 20, 37, 0.8);
      border-radius: 10px;
      color: var(--text-main);
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-size: 0.97rem;
      padding: 0.6rem 0.75rem;
      outline: none;
    }

    input::placeholder {
      color: rgba(191, 214, 252, 0.58);
    }

    button {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      border: 1px solid rgba(116, 188, 255, 0.42);
      background: linear-gradient(180deg, rgba(68, 147, 247, 0.26), rgba(40, 106, 193, 0.35));
      color: var(--text-main);
      border-radius: 10px;
      padding: 0.55rem 0.86rem;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.2s ease;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.12);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .danger {
      border-color: rgba(255, 127, 127, 0.5);
      background: linear-gradient(180deg, rgba(255, 95, 95, 0.22), rgba(160, 44, 44, 0.38));
    }

    .message {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      color: var(--text-muted);
      margin: 0.55rem 0 1rem;
      min-height: 1.1rem;
    }

    .error {
      color: #ffd1d1;
      text-shadow: 0 0 9px rgba(255, 89, 89, 0.55);
    }

    .matches {
      display: grid;
      gap: 0.75rem;
    }

    .match-card {
      border: 1px solid rgba(146, 201, 255, 0.28);
      border-radius: 14px;
      background: linear-gradient(175deg, rgba(18, 30, 58, 0.75), rgba(8, 15, 29, 0.82));
      padding: 0.8rem;
    }

    .match-head,
    .teams,
    .match-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .match-head {
      margin-bottom: 0.45rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.16rem 0.52rem;
      border-radius: 999px;
      border: 1px solid transparent;
      text-transform: uppercase;
    }

    .pill.ongoing {
      color: #d4ffe4;
      background: rgba(63, 211, 130, 0.2);
      border-color: rgba(63, 211, 130, 0.48);
    }

    .pill.finished {
      color: #d2deff;
      background: rgba(136, 156, 211, 0.18);
      border-color: rgba(136, 156, 211, 0.42);
    }

    .pill.scheduled,
    .pill.configured,
    .pill.ready,
    .pill.unknown {
      color: #ffe2be;
      background: rgba(255, 181, 71, 0.18);
      border-color: rgba(255, 181, 71, 0.42);
    }

    .competition {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text-main);
      font-weight: 700;
    }

    .match-id {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-size: 0.8rem;
      color: rgba(198, 223, 255, 0.66);
    }

    .teams {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      color: var(--text-main);
      font-size: clamp(1rem, 2vw, 1.1rem);
      font-weight: 700;
      margin-bottom: 0.45rem;
    }

    .score {
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      font-size: 1.6rem;
      color: #ffffff;
      letter-spacing: 0.06em;
      text-shadow: 0 0 14px rgba(80, 150, 255, 0.65);
      min-width: 5ch;
      text-align: center;
    }

    .muted {
      color: var(--text-muted);
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-size: 0.9rem;
    }

    .match-foot a {
      color: #8dd2ff;
      text-decoration: none;
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.84rem;
    }

    .match-foot a:hover {
      text-decoration: underline;
    }

    .pager {
      margin-top: 0.85rem;
      justify-content: space-between;
    }

    .date-hint {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-size: clamp(0.74rem, 1.8vw, 0.95rem);
      font-weight: 600;
      letter-spacing: 0.14em;
      color: rgba(200, 210, 255, 0.6);
      text-transform: uppercase;
      user-select: none;
      text-align: center;
    }

    .match-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .match-actions .open-details-btn {
      font-size: 0.8rem;
      padding: 0.42rem 0.64rem;
    }

    .match-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
    }

    .match-modal.open {
      display: block;
    }

    .match-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
    }

    .match-modal-dialog {
      position: relative;
      width: min(980px, calc(100% - 1.2rem));
      max-height: calc(100vh - 1.2rem);
      margin: 0.6rem auto;
      border: 1px solid rgba(120, 180, 255, 0.32);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(7, 15, 33, 0.96), rgba(6, 11, 22, 0.98));
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(8px) saturate(1.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .match-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(120, 180, 255, 0.2);
      background: rgba(18, 34, 66, 0.6);
    }

    .match-modal-title {
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      font-size: clamp(1.3rem, 3.2vw, 2rem);
      letter-spacing: 0.06em;
      color: var(--text-main);
      text-transform: uppercase;
    }

    .match-modal-close {
      border-color: rgba(255, 127, 127, 0.55);
      background: linear-gradient(180deg, rgba(255, 95, 95, 0.2), rgba(160, 44, 44, 0.34));
      padding: 0.45rem 0.7rem;
      font-size: 0.78rem;
    }

    .match-modal-body {
      padding: 0.9rem 1rem 1rem;
      overflow: auto;
      display: grid;
      gap: 0.85rem;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 0.5rem;
    }

    .detail-item {
      border: 1px solid rgba(146, 201, 255, 0.2);
      background: rgba(10, 22, 45, 0.68);
      border-radius: 10px;
      padding: 0.5rem 0.6rem;
    }

    .detail-k {
      color: rgba(176, 208, 255, 0.72);
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .detail-v {
      color: var(--text-main);
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-top: 0.2rem;
    }

    .detail-section {
      border: 1px solid rgba(146, 201, 255, 0.24);
      background: rgba(9, 17, 35, 0.72);
      border-radius: 12px;
      padding: 0.72rem;
    }

    .detail-section h3 {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(191, 219, 255, 0.94);
      margin-bottom: 0.45rem;
    }

    .analysis-list,
    .player-list {
      margin-left: 1rem;
      color: var(--text-muted);
      font-family: 'Rajdhani', 'Arial', sans-serif;
      display: grid;
      gap: 0.25rem;
    }

    .split {
      display: grid;
      gap: 0.72rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    @media (max-width: 620px) {
      .score {
        width: 100%;
      }

      .pager {
        justify-content: center;
      }
    }

    /* Scanline glitch effect */
    #overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.04) 2px,
        rgba(0, 0, 0, 0.04) 4px
      );
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- YouTube background -->
  <div id="yt-bg">
    <iframe
      id="yt-iframe"
      src="https://www.youtube.com/embed/jidLL9rE90M?autoplay=1&mute=1&loop=1&playlist=jidLL9rE90M&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&disablekb=1&fs=0&cc_load_policy=0&playsinline=1&enablejsapi=1"
      allow="autoplay; encrypted-media"
      allowfullscreen
    ></iframe>
  </div>

  <div id="overlay"></div>

  <!-- Main content -->
  <div id="content">
    <div class="main-title">NEMPPi MATCHIT</div>
    <div class="sub-label">Bootcamp On Alkanut · FACEIT CS2</div>

    <div class="panel">
      <div class="top-row">
        <div class="meta" id="status-line"><span class="status-dot"></span>Yhteys odottaa palvelinta</div>
        <div class="controls">
          <button id="refresh-btn" type="button">Paivita</button>
        </div>
      </div>

      <div class="message" id="message"></div>

      <div class="matches" id="matches"></div>

      <div class="pager">
        <button id="prev-btn" type="button">Edellinen</button>
        <div class="meta" id="page-label">Sivu 1</div>
        <button id="next-btn" type="button">Seuraava</button>
      </div>
    </div>

    <div class="date-hint" id="date-hint">Haetaan NEMPPi pelaajan ottelut ajasta nyt eteenpain</div>
  </div>

  <div id="match-modal" class="match-modal" aria-hidden="true">
    <div class="match-modal-backdrop" data-close-modal="1"></div>
    <div class="match-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="match-modal-title">
      <div class="match-modal-head">
        <div class="match-modal-title" id="match-modal-title">Ottelun tiedot</div>
        <button id="match-modal-close" type="button" class="match-modal-close">Sulje</button>
      </div>
      <div id="match-modal-body" class="match-modal-body"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      proxyApiBase: '/api/faceit',
      directApiBase: 'https://open.faceit.com/data/v4',
      publicApiKey: '',
      nickname: 'NEMPPi',
      game: 'cs2',
      pageSize: 20,
      futureWindowDays: 120
    };

    const elements = {
      statusLine: document.getElementById('status-line'),
      message: document.getElementById('message'),
      matches: document.getElementById('matches'),
      dateHint: document.getElementById('date-hint'),
      matchModal: document.getElementById('match-modal'),
      matchModalTitle: document.getElementById('match-modal-title'),
      matchModalBody: document.getElementById('match-modal-body'),
      matchModalClose: document.getElementById('match-modal-close'),
      refreshBtn: document.getElementById('refresh-btn'),
      prevBtn: document.getElementById('prev-btn'),
      nextBtn: document.getElementById('next-btn'),
      pageLabel: document.getElementById('page-label')
    };

    const state = {
      useProxy: true,
      playerId: '',
      offset: 0,
      hasNext: false,
      isLoading: false,
      startedFrom: Math.floor(Date.now() / 1000),
      toUnix: Math.floor(Date.now() / 1000) + CONFIG.futureWindowDays * 24 * 60 * 60,
      lastUpdated: '',
      selectedMatchId: '',
      detailsCache: {}
    };

    function setStatus(text, ok = false) {
      elements.statusLine.innerHTML = '<span class="status-dot' + (ok ? ' ok' : '') + '"></span>' + text;
    }

    function setMessage(text, isError = false) {
      elements.message.textContent = text || '';
      elements.message.className = isError ? 'message error' : 'message';
    }

    async function faceitFetch(path, params) {
      const base = state.useProxy ? CONFIG.proxyApiBase : CONFIG.directApiBase;
      const url = state.useProxy
        ? new URL(base + path, window.location.origin)
        : new URL(base + path);

      if (params) {
        Object.entries(params).forEach(([k, v]) => {
          if (v !== undefined && v !== null && v !== '') {
            url.searchParams.set(k, String(v));
          }
        });
      }

      const headers = {
        Accept: 'application/json'
      };

      if (!state.useProxy) {
        const key = (CONFIG.publicApiKey || 'f9458d8a-a3de-4801-9224-152cd76e8000').trim();
        if (!key) {
          throw new Error('Aseta FACEIT API key CONFIG.publicApiKey-kenttaan index.html tiedostossa.');
        }
        headers.Authorization = /^bearer\s+/i.test(key) ? key : 'Bearer ' + key;
      }

      const response = await fetch(url.toString(), {
        headers: headers
      });

      // On GitHub Pages, /api/faceit returns a static 404 page (text/html).
      if (state.useProxy && response.status === 404) {
        const contentType = (response.headers.get('content-type') || '').toLowerCase();
        if (contentType.includes('text/html')) {
          throw new Error('Backend proxya ei ole saatavilla GitHub Pagesissa. Kayta suoraa API-tilaa asettamalla CONFIG.publicApiKey.');
        }
      }

      if (response.status === 404) {
        return null;
      }

      if (!response.ok) {
        let details = '';
        try {
          const data = await response.json();
          details = data && data.message ? data.message : '';
        } catch (e) {
          details = '';
        }
        throw new Error('FACEIT virhe ' + response.status + (details ? ': ' + details : ''));
      }

      return response.json();
    }

    function getMatchTime(match) {
      return match.scheduled_at || match.started_at || match.finished_at || 0;
    }

    function fmtDate(unixSeconds) {
      if (!unixSeconds) {
        return 'Ei aikaa';
      }
      return new Date(unixSeconds * 1000).toLocaleString('fi-FI', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function statusClass(status) {
      const value = (status || '').toLowerCase();
      if (value.includes('ongoing') || value.includes('started')) {
        return 'ongoing';
      }
      if (value.includes('finished') || value.includes('cancelled')) {
        return 'finished';
      }
      if (value.includes('scheduled') || value.includes('configured') || value.includes('ready')) {
        return value;
      }
      return 'unknown';
    }

    function formatScore(match) {
      const score = match && match.results && match.results.score ? match.results.score : null;
      if (!score) {
        return '-';
      }
      const values = Object.values(score);
      if (!values.length) {
        return '-';
      }
      return values.join(' : ');
    }

    function teamNames(match) {
      const teams = (match && match.teams) || {};
      const list = Object.values(teams)
        .map(function (team) {
          return team && team.nickname ? team.nickname : '';
        })
        .filter(Boolean);

      if (!list.length) {
        return ['TBD', 'TBD'];
      }

      if (list.length === 1) {
        return [list[0], 'TBD'];
      }

      return [list[0], list[1]];
    }

    function faceitStatsUrl() {
      return 'https://www.faceit.com/en/players/' + encodeURIComponent(CONFIG.nickname) + '/stats/' + CONFIG.game;
    }

    function buildFaceitUrl(match) {
      const raw = match && match.faceit_url ? String(match.faceit_url) : '';
      if (!raw) {
        return faceitStatsUrl();
      }

      const normalized = raw.replace('{lang}', 'en');
      if (/^https:\/\/www\.faceit\.com\//i.test(normalized)) {
        return normalized;
      }

      return faceitStatsUrl();
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function parseNumber(value) {
      const n = Number(String(value == null ? '' : value).replace(',', '.'));
      return Number.isFinite(n) ? n : 0;
    }

    function probabilityText(value) {
      const n = parseNumber(value);
      if (!n) {
        return '-';
      }
      const normalized = n > 1 ? n / 100 : n;
      return Math.round(normalized * 100) + '%';
    }

    function teamFromFaction(matchDetails, factionId) {
      if (!matchDetails || !matchDetails.teams || !factionId) {
        return null;
      }
      return matchDetails.teams[factionId] || null;
    }

    function factionScore(matchDetails, factionId) {
      const detailed = Array.isArray(matchDetails && matchDetails.detailed_results)
        ? matchDetails.detailed_results[0]
        : null;
      if (detailed && detailed.factions && detailed.factions[factionId]) {
        const score = detailed.factions[factionId].score;
        return score == null ? '-' : String(score);
      }

      const score = matchDetails && matchDetails.results && matchDetails.results.score
        ? matchDetails.results.score[factionId]
        : null;
      return score == null ? '-' : String(score);
    }

    function mapText(matchDetails) {
      const voting = matchDetails && matchDetails.voting ? matchDetails.voting : null;
      if (!voting || !voting.map) {
        return 'Ei tiedossa';
      }

      const map = voting.map;
      if (typeof map === 'string') {
        return map;
      }
      if (Array.isArray(map.pick) && map.pick.length) {
        return String(map.pick[0]);
      }
      if (Array.isArray(map.selected) && map.selected.length) {
        return String(map.selected[0]);
      }
      if (map.pick && typeof map.pick === 'string') {
        return map.pick;
      }
      return 'Ei tiedossa';
    }

    function buildTopPlayers(statsPayload) {
      if (!statsPayload || !Array.isArray(statsPayload.rounds) || !statsPayload.rounds.length) {
        return [];
      }

      const totals = {};
      statsPayload.rounds.forEach(function (round) {
        const teams = round && round.teams ? Object.values(round.teams) : [];
        teams.forEach(function (team) {
          const players = team && Array.isArray(team.players) ? team.players : [];
          players.forEach(function (player) {
            const pid = player && (player.player_id || player.nickname || 'unknown');
            const name = player && player.nickname ? player.nickname : 'unknown';
            const playerStats = player && player.player_stats ? player.player_stats : {};
            const kills = parseNumber(playerStats.Kills || playerStats.kills || playerStats.K || 0);
            const deaths = parseNumber(playerStats.Deaths || playerStats.deaths || playerStats.D || 0);

            if (!totals[pid]) {
              totals[pid] = { nickname: name, kills: 0, deaths: 0 };
            }
            totals[pid].kills += kills;
            totals[pid].deaths += deaths;
          });
        });
      });

      return Object.values(totals)
        .sort(function (a, b) {
          if (b.kills !== a.kills) {
            return b.kills - a.kills;
          }
          return a.deaths - b.deaths;
        })
        .slice(0, 3);
    }

    function analysisLines(matchDetails, statsPayload) {
      const lines = [];
      const winnerId = matchDetails && matchDetails.results ? matchDetails.results.winner : '';
      const winnerTeam = teamFromFaction(matchDetails, winnerId);
      if (winnerTeam && winnerTeam.name) {
        lines.push('Voittaja: ' + winnerTeam.name + '.');
      }

      const team1 = teamFromFaction(matchDetails, 'faction1');
      const team2 = teamFromFaction(matchDetails, 'faction2');
      const wp1 = team1 && team1.stats ? team1.stats.winProbability : null;
      const wp2 = team2 && team2.stats ? team2.stats.winProbability : null;

      if (wp1 != null && wp2 != null) {
        lines.push('Voittotodennakoisyydet ennen ottelua: ' +
          (team1 && team1.name ? team1.name : 'Team 1') + ' ' + probabilityText(wp1) + ' · ' +
          (team2 && team2.name ? team2.name : 'Team 2') + ' ' + probabilityText(wp2) + '.');
      }

      const top = buildTopPlayers(statsPayload);
      if (top.length) {
        lines.push('Top fragger datajoukosta: ' + top[0].nickname + ' (' + top[0].kills + '/' + top[0].deaths + ').');
      } else {
        lines.push('Pelaajakohtainen ottelustats ei ollut saatavilla tasta ottelusta Data APIssa.');
      }

      return lines;
    }

    function rosterList(team) {
      const roster = team && Array.isArray(team.roster) ? team.roster : [];
      if (!roster.length) {
        return '<li>Ei roster-dataa</li>';
      }
      return roster
        .map(function (player) {
          const nick = player && player.nickname ? player.nickname : 'unknown';
          return '<li>' + escapeHtml(nick) + '</li>';
        })
        .join('');
    }

    function setModalOpen(open) {
      elements.matchModal.classList.toggle('open', open);
      elements.matchModal.setAttribute('aria-hidden', open ? 'false' : 'true');
    }

    function renderMatchDetailsPanel(bundle) {
      const details = bundle.details;
      const stats = bundle.stats;
      const team1 = teamFromFaction(details, 'faction1') || {};
      const team2 = teamFromFaction(details, 'faction2') || {};
      const score1 = factionScore(details, 'faction1');
      const score2 = factionScore(details, 'faction2');
      const analyses = analysisLines(details, stats);
      const topPlayers = buildTopPlayers(stats);
      const faceitUrl = buildFaceitUrl(details);

      elements.matchModalTitle.textContent = (details.competition_name || 'Match') + ' · ' + (details.status || 'unknown');
      elements.matchModalBody.innerHTML = '' +
        '<div class="detail-grid">' +
          '<div class="detail-item"><div class="detail-k">Match ID</div><div class="detail-v">' + escapeHtml(details.match_id || 'n/a') + '</div></div>' +
          '<div class="detail-item"><div class="detail-k">Aika</div><div class="detail-v">' + escapeHtml(fmtDate(getMatchTime(details))) + '</div></div>' +
          '<div class="detail-item"><div class="detail-k">Region</div><div class="detail-v">' + escapeHtml(details.region || 'N/A') + '</div></div>' +
          '<div class="detail-item"><div class="detail-k">Map</div><div class="detail-v">' + escapeHtml(mapText(details)) + '</div></div>' +
          '<div class="detail-item"><div class="detail-k">Tulos</div><div class="detail-v">' + escapeHtml(score1 + ' : ' + score2) + '</div></div>' +
          '<div class="detail-item"><div class="detail-k">Paras 3</div><div class="detail-v">' + escapeHtml(topPlayers.length ? topPlayers.length + ' pelaajaa' : 'Ei saatavilla') + '</div></div>' +
        '</div>' +
        '<div class="split">' +
          '<section class="detail-section"><h3>' + escapeHtml(team1.name || 'Team 1') + '</h3><ul class="player-list">' + rosterList(team1) + '</ul></section>' +
          '<section class="detail-section"><h3>' + escapeHtml(team2.name || 'Team 2') + '</h3><ul class="player-list">' + rosterList(team2) + '</ul></section>' +
        '</div>' +
        '<section class="detail-section"><h3>Otteluanalyysi</h3><ul class="analysis-list">' +
          analyses.map(function (line) { return '<li>' + escapeHtml(line) + '</li>'; }).join('') +
        '</ul></section>' +
        '<section class="detail-section"><h3>Top Pelaajat</h3>' +
          (topPlayers.length
            ? '<ul class="analysis-list">' + topPlayers.map(function (p) { return '<li>' + escapeHtml(p.nickname + ' · K/D ' + p.kills + '/' + p.deaths) + '</li>'; }).join('') + '</ul>'
            : '<div class="muted">Ei pelaajakohtaista round-dataa tassa ottelussa.</div>') +
        '</section>' +
        '<section class="detail-section"><h3>Lisaksi</h3><a href="' + escapeHtml(faceitUrl) + '" target="_blank" rel="noopener noreferrer">Avaa FACEIT-sivulla</a></section>';
    }

    async function openMatchDetails(matchId) {
      if (!matchId) {
        return;
      }

      state.selectedMatchId = matchId;
      setModalOpen(true);
      elements.matchModalTitle.textContent = 'Ottelun tiedot';
      elements.matchModalBody.innerHTML = '<div class="message">Ladataan ottelun lisatietoja...</div>';

      try {
        let bundle = state.detailsCache[matchId];
        if (!bundle) {
          const details = await faceitFetch('/matches/' + matchId);
          let stats = null;
          try {
            stats = await faceitFetch('/matches/' + matchId + '/stats');
          } catch (statsError) {
            stats = null;
          }
          bundle = { details: details, stats: stats };
          state.detailsCache[matchId] = bundle;
        }

        if (!bundle.details) {
          throw new Error('Ottelun tietoja ei loytynyt.');
        }

        renderMatchDetailsPanel(bundle);
      } catch (error) {
        elements.matchModalBody.innerHTML = '<div class="message error">' + escapeHtml(error.message || 'Tuntematon virhe') + '</div>';
      }
    }

    function closeMatchDetails() {
      setModalOpen(false);
      state.selectedMatchId = '';
    }

    function renderMatches(matches) {
      elements.matches.innerHTML = '';

      if (!matches.length) {
        elements.matches.innerHTML = '<div class="message">Ei otteluita nykyisella haulla.</div>';
        return;
      }

      matches.forEach(function (match) {
        const teams = teamNames(match);
        const card = document.createElement('article');
        card.className = 'match-card';

        const status = (match.status || 'unknown').toLowerCase();
        const statusText = status || 'unknown';
        const competition = match.competition_name || match.competition_type || 'FACEIT Match';
        const id = match.match_id || 'n/a';
        const score = formatScore(match);
        const time = fmtDate(getMatchTime(match));
        const region = match.region || 'N/A';
        const url = buildFaceitUrl(match);
        const safeMatchId = escapeHtml(id);

        card.innerHTML = '' +
          '<div class="match-head">' +
            '<div>' +
              '<div class="competition">' + competition + '</div>' +
              '<div class="match-id">Match ID: ' + id + '</div>' +
            '</div>' +
            '<span class="pill ' + statusClass(statusText) + '">' + statusText + '</span>' +
          '</div>' +
          '<div class="teams">' +
            '<span>' + teams[0] + '</span>' +
            '<span class="score">' + score + '</span>' +
            '<span>' + teams[1] + '</span>' +
          '</div>' +
          '<div class="match-foot">' +
            '<div class="muted">Aika: ' + time + ' · Region: ' + region + '</div>' +
            '<div class="match-actions">' +
              '<button type="button" class="open-details-btn" data-match-id="' + safeMatchId + '">Avaa tiedot</button>' +
              '<a href="' + url + '" target="_blank" rel="noopener noreferrer">Avaa FACEIT</a>' +
            '</div>' +
          '</div>';

        elements.matches.appendChild(card);
      });
    }

    function updatePager() {
      const page = Math.floor(state.offset / CONFIG.pageSize) + 1;
      elements.pageLabel.textContent = 'Sivu ' + page;
      elements.prevBtn.disabled = state.offset === 0 || state.isLoading;
      elements.nextBtn.disabled = !state.hasNext || state.isLoading;
    }

    async function loadPlayer() {
      const data = await faceitFetch('/players', { nickname: CONFIG.nickname });
      if (!data || !data.player_id) {
        throw new Error('Pelaajaa ei loytynyt nimella: ' + CONFIG.nickname);
      }
      state.playerId = data.player_id;
      return data;
    }

    async function loadMatches(resetOffset) {
      if (resetOffset) {
        state.offset = 0;
      }

      state.isLoading = true;
      updatePager();
      setStatus('Haetaan otteluita...', false);
      setMessage('Ladataan dataa...');

      try {
        if (!state.playerId) {
          await loadPlayer();
        }

        const payload = await faceitFetch('/players/' + state.playerId + '/history', {
          game: CONFIG.game,
          from: state.startedFrom,
          to: state.toUnix,
          offset: state.offset,
          limit: CONFIG.pageSize
        });

        const items = payload && Array.isArray(payload.items) ? payload.items.slice() : [];
        items.sort(function (a, b) {
          return getMatchTime(a) - getMatchTime(b);
        });

        state.hasNext = items.length === CONFIG.pageSize;
        state.lastUpdated = new Date().toLocaleTimeString('fi-FI');

        renderMatches(items);
        setStatus('Yhteys ok · Paivitetty ' + state.lastUpdated, true);
        setMessage('Pelaaja: ' + CONFIG.nickname + ' · Matchit ajasta nyt eteenpain.');
      } catch (error) {
        setStatus('Yhteysvirhe', false);
        setMessage(error.message || 'Tuntematon virhe', true);
        renderMatches([]);
      } finally {
        state.isLoading = false;
        updatePager();
      }
    }

    elements.refreshBtn.addEventListener('click', function () {
      loadMatches(false);
    });

    elements.matches.addEventListener('click', function (event) {
      const trigger = event.target.closest('.open-details-btn');
      if (!trigger) {
        return;
      }

      const matchId = trigger.getAttribute('data-match-id');
      openMatchDetails(matchId);
    });

    elements.matchModalClose.addEventListener('click', closeMatchDetails);
    elements.matchModal.addEventListener('click', function (event) {
      const closeTrigger = event.target.closest('[data-close-modal="1"]');
      if (closeTrigger) {
        closeMatchDetails();
      }
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape' && elements.matchModal.classList.contains('open')) {
        closeMatchDetails();
      }
    });

    elements.prevBtn.addEventListener('click', function () {
      if (state.offset === 0 || state.isLoading) {
        return;
      }
      state.offset = Math.max(0, state.offset - CONFIG.pageSize);
      loadMatches(false);
    });

    elements.nextBtn.addEventListener('click', function () {
      if (!state.hasNext || state.isLoading) {
        return;
      }
      state.offset += CONFIG.pageSize;
      loadMatches(false);
    });

    function init() {
      const host = (window.location.hostname || '').toLowerCase();
      const isGithubPages = host.endsWith('github.io');
      if (isGithubPages) {
        state.useProxy = false;
      }

      elements.dateHint.textContent = 'Hakuaika alkaa: ' + fmtDate(state.startedFrom) + ' · Game: ' + CONFIG.game;
      updatePager();
      loadMatches(true);

      // Auto refresh keeps first page up to date while preserving manual browsing on other pages.
      setInterval(function () {
        if (state.offset === 0 && !state.isLoading) {
          loadMatches(false);
        }
      }, 60000);
    }

    init();
  </script>
</body>
</html>
